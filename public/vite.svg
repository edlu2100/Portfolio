<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;display=swap');
    </style>
  </defs>

  <!-- Background: dark navy square with slightly rounded corners -->
  <rect width="64" height="64" rx="8" fill="#0a0e1a"/>

  <!-- Thin accent line, top -->
  <line x1="14" y1="11" x2="50" y2="11" stroke="#a98a5c" stroke-width="0.8" opacity="0.7"/>

  <!-- EL text -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="28"
    font-weight="400"
    letter-spacing="2"
    fill="#a98a5c"
  >EL</text>

  <!-- Thin accent line, bottom -->
  <line x1="14" y1="53" x2="50" y2="53" stroke="#a98a5c" stroke-width="0.8" opacity="0.7"/>
</svg>
